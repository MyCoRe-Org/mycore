<div class="collapse" id="exCollapsingNavbar">
  <div class="webcli-settings-panel bg-dark p-3">
      <div class="mb-3 row">
        <label class="col-sm-3 col-form-label">Log History Size:</label>
        <div class="col-sm-2">
          <input type="text" class="form-control" [(ngModel)]="settings.historySize" (change)="onHistoryChange()">
        </div>
      </div>
      <div class="mb-3 row">
        <label class="col-sm-3 col-form-label">Command History Size:</label>
        <div class="col-sm-2">
          <input type="text" class="form-control" [(ngModel)]="settings.comHistorySize" (change)="onComHistoryChange()">
        </div>
        <div class="col-sm-auto d-flex align-items-center">
          <i class="fa fa-eraser comHistoryDeleteButton" (click)="deleteCommandHistory()" title="delete Command History"></i>
        </div>
      </div>
      <div class="mb-3 row">
        <label class="col-sm-3 col-form-label">AutoScroll Logs:</label>
        <div class="col-sm-2 d-flex align-items-center">
           <input type="checkbox" class="form-check-input mt-0" [(ngModel)]="settings.autoscroll" (change)="onAutoScrollChange($event)">
        </div>
      </div>
      <div class="row">
        <label class="col-sm-3 col-form-label">Continue if one fails:</label>
        <div class="col-sm-2 d-flex align-items-center">
           <input type="checkbox" class="form-check-input mt-0" [(ngModel)]="settings.continueIfOneFails" (change)="onContinueIfOneFailsChange($event)">
        </div>
      </div>
  </div>
</div>
