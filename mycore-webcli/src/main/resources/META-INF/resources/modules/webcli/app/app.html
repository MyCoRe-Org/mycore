<div id="web-cli-header">
  <web-cli-settings></web-cli-settings>
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <ul class="nav navbar-nav flex-row flex-wrap">
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" data-bs-display="static" href="#" role="button" aria-haspopup="true" aria-expanded="false" (click)="onClickCommandDropDown($event)">Command</a>
        <ul class="dropdown-menu" webcli-commands></ul>
      </li>
      <li class="nav-item">
        <span class="nav-link" (click)="clearLog()">
          <i class="fa fa-eraser"></i> Clear Logs
        </span>
      </li>
      <li class="nav-item" [hidden]="refreshRunning">
        <span class="nav-link" (click)="setRefresh(true)">
          <i class="fa fa-play"></i> Refresh
        </span>
      </li>
      <li class="nav-item" [hidden]="!refreshRunning">
        <span class="nav-link with-spinner" (click)="setRefresh(false)">
          <i class="fa fa-pause"></i> Stop Refresh
        </span>
      </li>
      <li class="nav-item">
        <span class="nav-link" (click)="clearCommandList()">
          <i class="fa fa-stop"></i> Clear Command Queue
        </span>
      </li>
      <li class="nav-item" (click)="showCommandHistory()" [hidden]="!commandHistory || commandHistory.length <= 0">
        <span class="nav-link">
           <i class="fa fa-archive"></i> Command History
        </span>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#exCollapsingNavbar" aria-controls="exCollapsingNavbar" aria-expanded="false" onclick='return false;'>
          <i class="fa fa-cog"></i> Settings
        </a>
      </li>
    </ul>
  </nav>
</div>
<web-cli-command-input></web-cli-command-input>
<div class="row" id="current-command">
  <div [hidden]="!currentCommand">
    <div class="col-lg-3 col-md-4 col-sm-5 current-command-label">
      Currently running command:
    </div>
    <div class="col-lg-9 col-md-8 col-sm-7" id="current-command-running" title="{{currentCommand}}">
      {{currentCommand}}
    </div>
    <div class="col-12">
      <div class="loader"></div>
    </div>
  </div>
  <div [hidden]="currentCommand">
    <div class="col-12 current-command-label">
      No command running currently.
    </div>
    <div class="col-12">
      <div class="loader-no-animation"></div>
    </div>
  </div>
</div>
<ul class="nav nav-tabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button type="button" class="nav-link logTab" [class.active]="activeTab == 'log'" (click)="selectTab('log')">Log</button>
  </li>
  <li class="nav-item" role="presentation" [hidden]="currentQueueLength == 0">
    <button type="button" class="nav-link queueTab" [class.active]="activeTab == 'queue'" (click)="selectTab('queue')">Command Queue ({{currentQueueLength}})</button>
  </li>
</ul>
<div class="tab-content">
  <div class="row tab-pane fade" [class.show]="activeTab == 'log'" [class.active]="activeTab == 'log'" id="log" role="tabpanel" web-cli-log></div>
  <div class="row tab-pane fade" [class.show]="activeTab == 'queue'" [class.active]="activeTab == 'queue'" id="queue" role="tabpanel" web-cli-queue></div>
</div>
<div class="modal fade" [class.show]="commandHistoryVisible" [style.display]="commandHistoryVisible ? 'block' : 'none'" [attr.aria-hidden]="commandHistoryVisible ? 'false' : 'true'" [attr.aria-modal]="commandHistoryVisible ? 'true' : null" id="comHistoryModal" tabindex="-1">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Command History</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="hideCommandHistory()"></button>
      </div>
      <div class="modal-body">
        <div class="list-group comHistoryList" *ngIf="commandHistory">
          <button *ngFor="let com of commandHistory" type="button" class="list-group-item list-group-item-action text-start" (click)="onSelectCommand(com)" title="{{com}}">{{com}}</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="commandHistoryVisible" (click)="hideCommandHistory()"></div>
