# Default deduplication criteria provider, aggregates the criterion builders configured per object type
MCR.DeDup.CriteriaProvider.Class=org.mycore.dedup.MCRDeDupCriteriaProvider

# Manager that reads and writes the deduplication keys and no-duplicate markings in the database
MCR.DeDup.KeyManager.Class=org.mycore.dedup.MCRDeDupKeyManager

# JPA mapping of the deduplication entities
MCR.JPA.MappingFileNames=%MCR.JPA.MappingFileNames%,META-INF/mycore-dedup-mappings.xml

# Keep the deduplication keys in sync with the object metadata on create, update, repair and delete
MCR.EventHandler.MCRObject.085.Class=org.mycore.dedup.MCRDeDupEventHandler

# URIResolver exposing the possible duplicates of an object as XML: dedup:duplicates:{objectId}
MCR.URIResolver.ModuleResolver.dedup.Class=org.mycore.dedup.MCRDeDupURIResolver

# Only session keys starting with one of these (comma-separated) prefixes may be read by
# dedup:duplicates-for-session:{sessionKey}
MCR.URIResolver.ModuleResolver.dedup.SessionKeyPrefixes=editor_

# JAX-RS resource packages of the standalone deduplication API served under /api/dedup
MCR.DeDup.API.Resource.Packages=org.mycore.dedup.resources
